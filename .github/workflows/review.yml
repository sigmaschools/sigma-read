name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.txt
          DIFF_SIZE=$(wc -l < /tmp/pr-diff.txt)
          echo "diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT
          if [ "$DIFF_SIZE" -gt 2000 ]; then
            head -2000 /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
            echo -e "\n\n... (diff truncated at 2000 lines, $DIFF_SIZE total)" >> /tmp/pr-diff-truncated.txt
            mv /tmp/pr-diff-truncated.txt /tmp/pr-diff.txt
          fi

      - name: Get changed file list
        run: git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed-files.txt

      - name: AI Review
        if: steps.diff.outputs.diff_size > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/pr-diff.txt', 'utf8');
            const changedFiles = fs.readFileSync('/tmp/changed-files.txt', 'utf8');
            const prBody = context.payload.pull_request.body || 'No description provided.';
            const prTitle = context.payload.pull_request.title;

            const prompt = `You are a code reviewer for Sigma Read — a Next.js app that generates reading comprehension content for students using AI. Stack: Next.js, TypeScript, Drizzle ORM, Neon Postgres, Anthropic Claude, Tailwind CSS.

            Review this pull request.

            **PR Title:** ${prTitle}
            **PR Description:** ${prBody}
            **Changed files:** ${changedFiles}
            **Diff:**
            \`\`\`
            ${diff}
            \`\`\`

            Provide: ## Summary, ## Issues, ## Security, ## Verdict (✅ APPROVE / ⚠️ CHANGES REQUESTED / 🔍 NEEDS DISCUSSION). Be concise. Focus on real problems.`;

            try {
              const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'content-type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                  model: 'claude-3-haiku-20240307',
                  max_tokens: 2048,
                  messages: [{ role: 'user', content: prompt }]
                })
              });

              if (!response.ok) throw new Error(`API returned ${response.status}`);

              const result = await response.json();
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: `## 🤖 AI Code Review\n\n${result.content[0].text}`,
                event: 'COMMENT'
              });
            } catch (err) {
              core.warning(`Review failed: ${err.message}`);
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: `## 🤖 AI Review\n\n⚠️ Automated review failed: ${err.message}\n\nManual review required.`,
                event: 'COMMENT'
              });
            }
